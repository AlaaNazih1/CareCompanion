name: care_companion
description: CareCompanion — Elderly Care Mobile Application for seniors and caregivers.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.11.4 <4.0.0'
  flutter: '>=3.10.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # ── State Management ──────────────────────────────────────────
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # ── Navigation ────────────────────────────────────────────────
  go_router: ^13.2.0

  # ── Firebase ──────────────────────────────────────────────────
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.4
  firebase_storage: ^12.3.2
  firebase_messaging: ^15.1.3        # FCM push notifications
  firebase_analytics: ^11.3.3
  firebase_app_check: ^0.3.1+3       # Prevent unauthorized API access

  # ── Local Storage ─────────────────────────────────────────────
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # ── Maps & Location (مجاني بالكامل - بديل Google Maps) ───────
  flutter_map: ^8.3.1                # OpenStreetMap - مجاني بدون API key
  latlong2: ^0.9.1                   # LatLng model for flutter_map
  flutter_map_cancellable_tile_provider: ^3.1.1  # Better tile loading
  geolocator: ^13.0.1                # GPS location access
  geocoding: ^3.0.0                  # Reverse geocoding (lat/lng → address)

  # ── Notifications ─────────────────────────────────────────────
  flutter_local_notifications: ^17.2.2   # On-device scheduled reminders
  flutter_timezone: ^5.1.0               # Timezone support for reminders
  timezone: ^0.9.4                       # TZ database
  sensors_plus: ^6.1.1                   # Accelerometer for fall detection

  # ── Camera & Image ────────────────────────────────────────────
  camera: ^0.10.5+9                  # Prescription scanner camera
  image_picker: ^1.1.1               # Medication photo upload
  cached_network_image: ^3.3.1       # Efficient image loading & caching

  # ── ML Kit (On-device OCR) ───────────────────────────────────
  google_mlkit_text_recognition: ^0.13.0   # Prescription OCR (Latin + Arabic)

  # ── Voice & Speech ────────────────────────────────────────────
  speech_to_text: ^7.4.0             # Voice command recognition
  flutter_tts: ^4.0.2                # Text-to-speech for medication reminders

  # ── Charts & Data Visualization ──────────────────────────────
  fl_chart: ^0.67.0                  # Vital signs trend charts

  # ── UI & Accessibility ───────────────────────────────────────
  flutter_screenutil: ^5.9.0         # Responsive sizing
  lottie: ^3.1.0                     # Animations
  shimmer: ^3.0.0                    # Loading skeletons

  # ── Biometric Authentication ─────────────────────────────────
  local_auth: ^2.2.0                 # Fingerprint / Face ID for senior app

  # ── Connectivity ─────────────────────────────────────────────
  connectivity_plus: ^6.0.3
  internet_connection_checker: ^1.0.0+1

  # ── PDF Report Generation ────────────────────────────────────
  pdf: ^3.11.1                       # Weekly health summary PDF
  printing: ^5.13.1                  # Share / open generated PDFs

  # ── Utilities ────────────────────────────────────────────────
  intl: ^0.20.2                      # Date formatting + Arabic locale (RTL)
  dartz: ^0.10.1                     # Functional Either<Failure, T>
  equatable: ^2.0.5                  # Value equality for models
  freezed_annotation: ^2.4.1        # Immutable data classes
  json_annotation: ^4.9.0           # JSON serialization
  logger: ^2.3.0                     # Structured debug logging
  package_info_plus: ^8.0.0         # App version info
  url_launcher: ^6.2.6              # Open phone dialer / external links
  permission_handler: ^11.3.1       # Runtime permissions
  uuid: ^4.4.0                       # Generate unique IDs for Firestore docs
  shared_preferences: ^2.2.3        # Lightweight key-value persistence
  path_provider: ^2.1.3             # File system paths
  http: ^1.6.0
  audioplayers: ^6.7.1
  flutter_dotenv: ^6.0.1



dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

  # ── Code Generation ───────────────────────────────────────────
  build_runner: ^2.4.9
  riverpod_generator: ^2.4.0
  freezed: ^2.5.2
  json_serializable: ^6.8.0
  hive_generator: ^2.0.1

  # ── App Icon Generation ───────────────────────────────────────
  flutter_launcher_icons: ^0.14.1

  # ── Testing ───────────────────────────────────────────────────
  mocktail: ^1.0.3
  integration_test:
    sdk: flutter

flutter:
  uses-material-design: true

  generate: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/
    - assets/sounds/

  fonts:
    - family: AppFont
      fonts:
        - asset: assets/fonts/Cairo-Regular.ttf
          weight: 400
        - asset: assets/fonts/Cairo-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Cairo-Bold.ttf
          weight: 700

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icons/logo.png"
  min_sdk_android: 21
  adaptive_icon_background: "#1557B0"
  adaptive_icon_foreground: "assets/icons/logo.png"